<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muhammad Ahsan Iqbal — Cybersecurity & Software Engineering</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#030712;--bg2:#070d1a;--surface:#0d1424;--surface2:#111827;
  --border:rgba(255,255,255,0.07);--text:#e2e8f0;--muted:#475569;
  --cyan:#22d3ee;--green:#4ade80;--orange:#fb923c;--purple:#c084fc;--red:#f87171;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--cyan);}

/* LOADER */
#loader{
  position:fixed;inset:0;z-index:9999;
  background:#030712;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 0.8s ease;
}
#loader.done{opacity:0;pointer-events:none;}
.ld-logo{
  font-family:'Syne',sans-serif;font-size:72px;font-weight:900;
  background:linear-gradient(135deg,#22d3ee,#c084fc,#fb923c);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:12px;letter-spacing:-2px;
}
.ld-name{font-family:'Space Mono',monospace;font-size:11px;color:#475569;letter-spacing:5px;text-transform:uppercase;margin-bottom:48px;}
.ld-bar{width:240px;height:2px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:16px;}
.ld-fill{height:100%;width:0;background:linear-gradient(90deg,#22d3ee,#c084fc,#fb923c);border-radius:2px;transition:width 0.1s linear;}
.ld-pct{font-family:'Space Mono',monospace;font-size:13px;color:#22d3ee;letter-spacing:3px;}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:20px 48px;display:flex;justify-content:space-between;align-items:center;
  transition:all 0.4s;
}
nav.scrolled{background:rgba(3,7,18,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 48px;}
.nav-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:900;background:linear-gradient(135deg,#22d3ee,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;}
.nav-links{display:flex;gap:32px;list-style:none;}
.nav-links a{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);text-decoration:none;letter-spacing:2px;text-transform:uppercase;transition:color 0.3s;}
.nav-links a:hover{color:var(--cyan);}

/* HERO */
#hero{min-height:100vh;display:flex;align-items:center;padding:120px 48px 80px;position:relative;overflow:hidden;}
.hero-bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:50px 50px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent);pointer-events:none;}
.orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(80px);}
.orb1{width:500px;height:500px;top:-100px;right:-100px;background:radial-gradient(circle,rgba(192,132,252,0.12),transparent 70%);}
.orb2{width:400px;height:400px;bottom:-100px;left:-50px;background:radial-gradient(circle,rgba(34,211,238,0.08),transparent 70%);}
.orb3{width:300px;height:300px;top:50%;left:40%;background:radial-gradient(circle,rgba(251,146,60,0.06),transparent 70%);}

.hero-grid{display:grid;grid-template-columns:1fr 360px;gap:80px;align-items:center;max-width:1200px;margin:0 auto;width:100%;position:relative;z-index:2;}

.hero-tag{display:inline-flex;align-items:center;gap:8px;padding:6px 18px;background:rgba(192,132,252,0.08);border:1px solid rgba(192,132,252,0.2);border-radius:50px;font-family:'Space Mono',monospace;font-size:10px;color:#c084fc;letter-spacing:3px;text-transform:uppercase;margin-bottom:24px;}
.tag-dot{width:6px;height:6px;border-radius:50%;background:#c084fc;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}

.hero-name{font-family:'Syne',sans-serif;font-size:clamp(44px,6vw,78px);font-weight:900;line-height:1;letter-spacing:-2px;margin-bottom:20px;}
.hero-name .n1{color:#f8fafc;}
.hero-name .n2{background:linear-gradient(135deg,#22d3ee,#c084fc,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

.hero-typed{font-family:'Space Mono',monospace;font-size:13px;margin-bottom:28px;height:22px;display:flex;align-items:center;gap:4px;}
#typed-text{background:linear-gradient(90deg,#22d3ee,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px;}
#typed-cursor{display:inline-block;width:2px;height:16px;background:#22d3ee;animation:blink 0.8s infinite;}

.hero-desc{font-size:16px;color:var(--muted);line-height:1.85;max-width:540px;margin-bottom:40px;}
.hero-desc strong{color:var(--text);}

.hero-btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:48px;}
.btn-p{
  display:inline-flex;align-items:center;gap:8px;padding:13px 28px;
  background:linear-gradient(135deg,#22d3ee,#c084fc);
  color:#000;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;
  letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;
  border-radius:6px;transition:all 0.3s;
  box-shadow:0 0 30px rgba(34,211,238,0.25);
}
.btn-p:hover{transform:translateY(-3px);box-shadow:0 0 50px rgba(192,132,252,0.4);}
.btn-o{
  display:inline-flex;align-items:center;gap:8px;padding:12px 24px;
  border:1px solid var(--border);color:var(--text);
  font-family:'Syne',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;
  border-radius:6px;transition:all 0.3s;
}
.btn-o:hover{border-color:var(--cyan);color:var(--cyan);transform:translateY(-3px);}
.btn-wa{border-color:rgba(74,222,128,0.3)!important;color:#4ade80!important;}
.btn-wa:hover{border-color:#4ade80!important;box-shadow:0 0 20px rgba(74,222,128,0.2);}

.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.stat{
  padding:16px;border-radius:10px;text-align:center;
  border:1px solid;transition:transform 0.3s;cursor:default;
}
.stat:hover{transform:translateY(-4px);}
.stat.s1{background:rgba(34,211,238,0.06);border-color:rgba(34,211,238,0.15);}
.stat.s2{background:rgba(192,132,252,0.06);border-color:rgba(192,132,252,0.15);}
.stat.s3{background:rgba(251,146,60,0.06);border-color:rgba(251,146,60,0.15);}
.stat.s4{background:rgba(74,222,128,0.06);border-color:rgba(74,222,128,0.15);}
.stat-n{font-family:'Syne',sans-serif;font-size:22px;font-weight:900;line-height:1;margin-bottom:4px;}
.s1 .stat-n{color:#22d3ee;}
.s2 .stat-n{color:#c084fc;}
.s3 .stat-n{color:#fb923c;}
.s4 .stat-n{color:#4ade80;}
.stat-l{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}

/* TERMINAL CARD */
.hero-card{background:var(--surface);border:1px solid rgba(192,132,252,0.12);border-radius:14px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,0.5),0 0 60px rgba(192,132,252,0.04);}
.card-bar{background:var(--surface2);padding:12px 16px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border);}
.cd{width:10px;height:10px;border-radius:50%;}
.card-title{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin:0 auto;letter-spacing:2px;}
.card-body{padding:22px;font-family:'Space Mono',monospace;font-size:11.5px;line-height:2.1;}
.ck{color:#c084fc;}.cs{color:#fb923c;}.cn{color:#22d3ee;}.cb{color:#4ade80;}.cc{color:#475569;}
.thm-mini{margin:0 20px 20px;background:rgba(0,0,0,0.3);border:1px solid rgba(34,211,238,0.08);border-radius:8px;padding:14px;display:flex;align-items:center;gap:12px;}
.thm-s{display:flex;gap:14px;}
.ts-n{font-family:'Syne',sans-serif;font-size:17px;font-weight:900;color:var(--cyan);}
.ts-l{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}

/* MARQUEE */
.marquee-wrap{overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface);padding:16px 0;}
.marquee{display:flex;animation:marquee 30s linear infinite;white-space:nowrap;}
.mq-item{display:inline-flex;align-items:center;gap:14px;padding:0 28px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}
.mq-dot{color:var(--cyan);}
@keyframes marquee{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* SECTION */
.sec{padding:90px 48px;max-width:1200px;margin:0 auto;}
.sec-alt{background:var(--bg2);}
.sec-alt .sec{background:transparent;}
.sec-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--cyan);letter-spacing:4px;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.sec-lbl::after{content:'';width:40px;height:1px;background:var(--border);}
.sec-title{font-family:'Syne',sans-serif;font-size:clamp(30px,4vw,50px);font-weight:900;color:#f8fafc;margin-bottom:56px;letter-spacing:-1px;line-height:1.1;}
.sec-title .ac{color:var(--cyan);}

/* REVEAL */
.rv{opacity:0;transform:translateY(28px);transition:opacity 0.7s,transform 0.7s;}
.rv.on{opacity:1;transform:translateY(0);}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start;}
.about-p{font-size:15px;color:var(--muted);line-height:1.9;margin-bottom:18px;}
.about-p strong{color:var(--text);}
.about-hl{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--cyan);border-radius:0 8px 8px 0;padding:18px 22px;margin:20px 0;font-family:'Space Mono',monospace;font-size:12px;color:var(--cyan);line-height:1.9;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.info-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;transition:border-color 0.3s;}
.info-item:hover{border-color:rgba(34,211,238,0.2);}
.i-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.i-val{font-size:13px;color:var(--text);font-weight:500;}

/* SKILLS */
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:36px;}
.tab{padding:8px 18px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;border-radius:4px;cursor:pointer;transition:all 0.3s;}
.tab.active,.tab:hover{background:rgba(34,211,238,0.06);border-color:rgba(34,211,238,0.25);color:var(--cyan);}
.tab-pane{display:none;}.tab-pane.active{display:block;}
.skills-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
.sk{display:flex;flex-direction:column;gap:7px;}
.sk-hd{display:flex;justify-content:space-between;}
.sk-nm{font-size:14px;color:var(--text);}
.sk-pc{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);}
.sk-bar{height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;}
.sk-fill{height:100%;border-radius:2px;width:0;transition:width 1.2s ease;background:linear-gradient(90deg,var(--cyan),var(--purple));}

/* EDU */
.edu-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;}
.timeline{position:relative;padding-left:28px;}
.timeline::before{content:'';position:absolute;left:0;top:8px;bottom:0;width:1px;background:var(--border);}
.t-item{position:relative;margin-bottom:36px;}
.t-item::before{content:'';position:absolute;left:-32px;top:6px;width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px rgba(34,211,238,0.5);}
.t-date{font-family:'Space Mono',monospace;font-size:9px;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;}
.t-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--text);margin-bottom:4px;}
.t-sub{font-size:13px;color:var(--muted);margin-bottom:10px;}
.badges{display:flex;gap:6px;flex-wrap:wrap;}
.badge{padding:3px 10px;border-radius:50px;font-family:'Space Mono',monospace;font-size:9px;border:1px solid;}
.bc{background:rgba(34,211,238,0.06);border-color:rgba(34,211,238,0.15);color:var(--cyan);}
.bo{background:rgba(251,146,60,0.06);border-color:rgba(251,146,60,0.15);color:var(--orange);}
.bp{background:rgba(192,132,252,0.06);border-color:rgba(192,132,252,0.15);color:var(--purple);}
.bg{background:rgba(74,222,128,0.06);border-color:rgba(74,222,128,0.15);color:var(--green);}
.cgpa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
.cgpa-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;transition:all 0.3s;}
.cgpa-card:hover{border-color:rgba(34,211,238,0.2);}
.cgpa-card.current{border-color:rgba(251,146,60,0.2);background:rgba(251,146,60,0.03);}
.cgpa-sem{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.cgpa-num{font-family:'Syne',sans-serif;font-size:24px;font-weight:900;color:var(--cyan);}
.cgpa-card.current .cgpa-num{color:var(--orange);}
.subj-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;}
.subj-title{font-family:'Space Mono',monospace;font-size:9px;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
.subj-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.subj-item:last-child{border-bottom:none;}
.subj-name{font-size:12px;color:var(--text);}
.subj-code{font-family:'Space Mono',monospace;font-size:9px;color:var(--cyan);padding:2px 8px;background:rgba(34,211,238,0.06);border-radius:4px;}

/* CERTS */
.thm-banner{background:linear-gradient(135deg,#050d1a,#0a1628);border:1px solid rgba(248,113,113,0.12);border-radius:16px;padding:36px;display:grid;grid-template-columns:1fr auto;gap:36px;align-items:center;margin-bottom:36px;position:relative;overflow:hidden;}
.thm-banner::before{content:'';position:absolute;top:-60px;right:60px;width:200px;height:200px;background:radial-gradient(circle,rgba(248,113,113,0.08),transparent 70%);}
.thm-stats-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:20px;}
.thm-stat-box{padding:12px 18px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;text-align:center;}
.tsb-n{font-family:'Syne',sans-serif;font-size:20px;font-weight:900;}
.tsb-l{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;}
.certs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.cert-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;position:relative;overflow:hidden;transition:all 0.3s;}
.cert-card:hover{transform:translateY(-4px);border-color:rgba(34,211,238,0.15);box-shadow:0 20px 40px rgba(0,0,0,0.3);}
.cert-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:50px;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;border:1px solid;}
.b-thm{background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.15);color:var(--red);}
.b-ua{background:rgba(192,132,252,0.08);border-color:rgba(192,132,252,0.15);color:var(--purple);}
.b-prog{background:rgba(34,211,238,0.06);border-color:rgba(34,211,238,0.15);color:var(--cyan);}
.b-spec{background:rgba(74,222,128,0.06);border-color:rgba(74,222,128,0.15);color:var(--green);}
.cert-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--text);margin-bottom:7px;line-height:1.3;}
.cert-date{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);}
.cert-emoji{font-size:28px;position:absolute;bottom:14px;right:14px;opacity:0.12;}

/* PROJECTS */
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:38px;margin-bottom:18px;transition:all 0.4s;position:relative;overflow:hidden;}
.proj-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(34,211,238,0.02),rgba(192,132,252,0.02));opacity:0;transition:opacity 0.4s;}
.proj-card:hover{border-color:rgba(34,211,238,0.12);transform:translateY(-5px);box-shadow:0 40px 80px rgba(0,0,0,0.4);}
.proj-card:hover::before{opacity:1;}
.proj-tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;}
.pt{padding:3px 11px;border-radius:50px;font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;border:1px solid;}
.proj-title{font-family:'Syne',sans-serif;font-size:clamp(20px,2.5vw,28px);font-weight:900;color:var(--text);margin-bottom:6px;}
.proj-sub{font-family:'Space Mono',monospace;font-size:9px;color:var(--orange);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;}
.proj-desc{font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:24px;max-width:580px;}
.proj-feats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:24px;}
.pf{padding:11px 13px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;}
.pf-icon{font-size:15px;margin-bottom:3px;}
.pf-name{font-size:11px;font-weight:600;color:var(--text);}
.pf-desc{font-size:9px;color:var(--muted);}
.proj-btns{display:flex;gap:10px;}

/* CONTACT */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:start;}
.ci-list{display:flex;flex-direction:column;gap:10px;}
.ci{display:flex;align-items:center;gap:14px;padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all 0.3s;}
.ci:hover{border-color:rgba(34,211,238,0.2);transform:translateX(6px);background:var(--surface2);}
.ci-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.ci-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.ci-val{font-size:13px;color:var(--text);font-weight:500;}
.ci-arr{color:var(--muted);font-size:11px;margin-left:auto;transition:transform 0.3s,color 0.3s;}
.ci:hover .ci-arr{transform:translateX(4px);color:var(--cyan);}
.form-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;}
.f-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:7px;}
.f-inp,.f-ta{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color 0.3s;margin-bottom:16px;}
.f-inp:focus,.f-ta:focus{border-color:rgba(34,211,238,0.3);}
.f-ta{height:110px;resize:vertical;}

/* FOOTER */
.footer-inner{max-width:1200px;margin:0 auto;padding:36px 48px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);}
.f-copy{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);}
.f-status{display:flex;align-items:center;gap:7px;font-family:'Space Mono',monospace;font-size:9px;color:var(--green);letter-spacing:2px;text-transform:uppercase;}
.f-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:blink 1.5s infinite;}
.f-social{display:flex;gap:10px;}
.fsb{width:34px;height:34px;border:1px solid var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);text-decoration:none;font-size:13px;transition:all 0.3s;}
